<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #f7f4ef;
      --card: #ffffff;
      --sage: #5a7a5e;
      --gold: #c49a3c;
      --text: #2c2c2c;
      --soft: #8a8a8a;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 100px;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      max-width: 520px;
      width: 100%;
      padding: 56px 52px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.07);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--sage), var(--gold));
    }

    /* Particles */
    .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0.6); }
      30%  { opacity: 0.45; }
      100% { opacity: 0; transform: translateY(-130px) scale(1.1); }
    }

    .icon {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 24px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.55rem, 4vw, 1.95rem);
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 20px;
      opacity: 0;
      animation: rise 0.8s ease forwards 0.6s;
    }

    .divider {
      width: 36px;
      height: 2px;
      background: linear-gradient(90deg, var(--sage), var(--gold));
      margin: 0 auto 28px;
      border-radius: 2px;
      opacity: 0;
      animation: rise 0.8s ease forwards 0.85s;
    }

    /* Paragraphs typed one by one */
    #letter-body { text-align: left; }

    .line {
      font-size: 1.05rem;
      font-weight: 300;
      color: #555;
      line-height: 1.9;
      margin-bottom: 1.4em;
      min-height: 1.9em;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .line.visible { opacity: 1; }
    .line .highlight { color: var(--sage); font-weight: 500; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--sage);
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 0.85s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .sign {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid #eee;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    .sign.visible { opacity: 1; }
    .sign-label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 6px;
    }
    .sign-name {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.3rem;
      color: var(--gold);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="particles" id="particles"></div>

  <span class="icon">🌱</span>
  <h1>Thank you for the lesson<br/>that changed everything</h1>
  <div class="divider"></div>

  <div id="letter-body"></div>

  <div class="sign" id="sign">
    <div class="sign-label">With a full heart</div>
    <div class="sign-name">Someone who grew because of you</div>
  </div>
</div>

<script>
  // ── Particles ──────────────────────────────────────────────
  const colors = ['#5a7a5e','#c49a3c','#a8c5aa','#e8d5a0'];
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    const size = 4 + Math.random() * 6;
    d.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[i % colors.length]};
      left:${Math.random()*100}%;
      top:${40 + Math.random()*55}%;
      --dur:${3 + Math.random()*4}s;
      --delay:${Math.random()*5}s;
    `;
    pContainer.appendChild(d);
  }

  // ── Content ─────────────────────────────────────────────────
  // Each entry: { html, pause (ms after finishing) }
  const paragraphs = [
    { html: `You came into my life carrying something I didn't ask for —`, pause: 400 },
    { html: `a truth that was bigger than my comfort.`, pause: 400 },
    { html: `I didn't know it then, but that was <span class="highlight">exactly the gift.</span>`, pause: 500 },
    { html: `You pushed me forward when I was standing still.`, pause: 400 },
    { html: `And today, I am walking in the light of what you taught me.`, pause: 400 },
    { html: `<span class="highlight">Thank you.</span> From a place of real peace.`, pause: 600 },
  ];

  // ── Helpers ──────────────────────────────────────────────────
  const wait = ms => new Promise(r => setTimeout(r, ms));
  const body = document.getElementById('letter-body');
  const sign = document.getElementById('sign');

  // Strip HTML to get plain chars, track tag injections by char index
  function buildSegments(html) {
    const segments = [];
    const tagRe = /<[^>]+>/g;
    let last = 0, m;
    while ((m = tagRe.exec(html)) !== null) {
      if (m.index > last) segments.push({ tag: false, val: html.slice(last, m.index) });
      segments.push({ tag: true, val: m[0] });
      last = tagRe.lastIndex;
    }
    if (last < html.length) segments.push({ tag: false, val: html.slice(last) });
    return segments;
  }

  async function typeLine(pEl, html, speed = 38) {
    pEl.classList.add('visible');
    const segments = buildSegments(html);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';

    let built = '';
    for (const seg of segments) {
      if (seg.tag) {
        built += seg.val;
        pEl.innerHTML = built;
        pEl.appendChild(cursor);
      } else {
        for (const ch of seg.val) {
          built += ch;
          pEl.innerHTML = built;
          pEl.appendChild(cursor);

          // Scroll so cursor stays visible
          cursor.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

          const delay = (ch === '.' || ch === ',' || ch === '—')
            ? speed * 5
            : speed + Math.random() * 18 - 8;
          await wait(Math.max(10, delay));
        }
      }
    }
    // Remove cursor cleanly
    pEl.innerHTML = built;
  }

  async function run() {
    await wait(1500);

    for (const { html, pause } of paragraphs) {
      const p = document.createElement('p');
      p.className = 'line';
      body.appendChild(p);

      await typeLine(p, html);
      await wait(pause);
    }

    sign.classList.add('visible');
    sign.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  run();
</script>
</body>
</html>
