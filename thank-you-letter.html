<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Letter I Never Wanted to Write</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0b0d14;
      --paper:    #0e1220;
      --amber:    #c8843a;
      --gold:     #e8b96a;
      --dim:      #4a4f6a;
      --text:     #d4cfc6;
      --soft:     #8a8699;
    }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 100px;
      overflow-x: hidden;
    }

    /* Candle glow — the signature element */
    .glow-orb {
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,132,58,0.18) 0%, rgba(200,132,58,0.06) 45%, transparent 70%);
      pointer-events: none;
      animation: breathe 5s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.07); }
    }

    .letter-wrap {
      position: relative;
      z-index: 1;
      max-width: 640px;
      width: 100%;
    }

    /* Date / eyebrow */
    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.3s;
    }

    /* Title */
    h1 {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.9rem, 5vw, 2.9rem);
      line-height: 1.25;
      color: var(--gold);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 1.1s ease forwards 0.6s;
    }

    .rule {
      width: 48px;
      height: 1px;
      background: var(--amber);
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.9s;
    }

    /* Paragraphs container */
    #letter-body {
      line-height: 1.95;
      font-size: clamp(1.05rem, 2.5vw, 1.2rem);
      font-weight: 300;
      color: var(--text);
    }

    #letter-body p {
      margin-bottom: 1.6em;
      min-height: 1em;
    }

    #letter-body em {
      font-style: italic;
      color: var(--gold);
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--amber);
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
      margin-left: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Signature */
    #signature {
      margin-top: 56px;
      opacity: 0;
      transition: opacity 1.8s ease;
      border-top: 1px solid var(--dim);
      padding-top: 32px;
    }

    #signature.visible { opacity: 1; }

    .sign-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 10px;
    }

    .sign-name {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: var(--amber);
    }

    .sign-note {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--soft);
      font-style: italic;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .glow-orb { animation: none; }
      .cursor   { animation: none; }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="letter-wrap">
    <div class="eyebrow">A letter I never wanted to write</div>
    <h1>Thank you for the lesson<br/>I wasn't ready to learn</h1>
    <div class="rule"></div>

    <div id="letter-body"></div>

    <div id="signature">
      <div class="sign-label">With hard-earned gratitude</div>
      <div class="sign-name">Someone who finally understands</div>
      <div class="sign-note">— even if it took everything to get here</div>
    </div>
  </div>

  <script>
    const paragraphs = [
      `I didn't want this. I want you to know that first. I wasn't looking for the lesson you brought with you. I was comfortable in what I thought I knew, settled inside an understanding of the world that felt safe — even if it was wrong.`,

      `But you arrived anyway. And what you left behind wasn't gentle. It cracked something open in me that I had spent years keeping closed. I resisted it. I resented it. I told myself it wasn't true, that the pain wasn't worth whatever was waiting on the other side.`,

      `I was wrong about that too.`,

      `The hardest truths don't wait for you to be ready. They come when they must — not because the universe is cruel, but because some things can only be learned through the weight of actually living them. You knew that. Maybe you didn't know you were teaching me. Maybe you did. It doesn't matter now.`,

      `What matters is this: I am different because of what you showed me. Not softer, not harder — but more honest. More awake. The version of me that existed before that lesson was protected, yes. But protection and understanding are not the same thing.`,

      `So I'm writing this letter I never planned to write. To say <em>thank you</em> — not easily, not without the memory of how much it hurt, but genuinely. For not letting me stay small. For being the thing I had to walk through to find what was on the other side.`,

      `I carry the lesson now. Not as a wound, but as a compass.`,
    ];

    const container = document.getElementById('letter-body');
    const sig = document.getElementById('signature');

    // Build paragraph elements
    const pEls = paragraphs.map(() => {
      const p = document.createElement('p');
      container.appendChild(p);
      return p;
    });

    // Typewriter engine
    async function wait(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function parseHTML(text) {
      // Split on <em> tags so we can write into them char-by-char
      const parts = [];
      const re = /<em>(.*?)<\/em>/g;
      let last = 0, m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) parts.push({ type: 'text', content: text.slice(last, m.index) });
        parts.push({ type: 'em', content: m[1] });
        last = re.lastIndex;
      }
      if (last < text.length) parts.push({ type: 'text', content: text.slice(last) });
      return parts;
    }

    async function typeParagraph(pEl, text, baseDelay = 28) {
      const parts = parseHTML(text);
      const cursor = document.createElement('span');
      cursor.className = 'cursor';

      for (const part of parts) {
        let node;
        if (part.type === 'em') {
          node = document.createElement('em');
        } else {
          node = document.createDocumentFragment();
        }

        pEl.appendChild(cursor); // cursor always at end

        for (const ch of part.content) {
          const t = document.createTextNode(ch);
          if (part.type === 'em') {
            node.appendChild(t);
            pEl.insertBefore(node, cursor);
          } else {
            pEl.insertBefore(t, cursor);
          }

          const jitter = ch === '.' || ch === ',' ? baseDelay * 5 : baseDelay + Math.random() * 18 - 9;
          await wait(Math.max(8, jitter));
        }
      }

      // Remove cursor after paragraph, pause
      cursor.remove();
      await wait(520);
    }

    async function runLetter() {
      await wait(1400); // let CSS animations settle

      for (let i = 0; i < paragraphs.length; i++) {
        await typeParagraph(pEls[i], paragraphs[i]);
        await wait(320);
      }

      sig.classList.add('visible');
    }

    runLetter();
  </script>
</body>
</html>
